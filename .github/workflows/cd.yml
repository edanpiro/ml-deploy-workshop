name: CD - Deploy a AKS

on:
  workflow_dispatch:
  # push:
  #  branches: [main]

jobs:
  deploy:
    name: Desplegar en AKS
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Azure (Service Principal)
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ vars.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ vars.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ vars.AZURE_TENANT_ID }}"}'

      - name: Obtener credenciales del cluster AKS
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME }}
          admin: true

      - name: Instalar kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: v0.1.6

      - name: Autenticar kubeconfig con Service Principal (kubelogin)
        run: kubelogin convert-kubeconfig -l spn
        env:
          AAD_SERVICE_PRINCIPAL_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AAD_SERVICE_PRINCIPAL_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Desplegar manifiestos en AKS
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/ml-api --timeout=120s
